<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0f12; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .prose p { margin-bottom: 0.75em; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
        .prose strong { color: #f8fafc; font-weight: 600; }
        
        /* Modal Animation */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 200ms, transform 200ms; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased selection:bg-indigo-500/30">

    <header class="fixed top-0 w-full bg-[#0d0f12]/80 backdrop-blur-md border-b border-white/5 z-20 flex justify-between items-center py-3 px-6">
        <div class="flex items-center space-x-3">
            <div class="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></div>
            <h1 class="text-sm font-medium tracking-wide text-gray-300">CRAG Reasoning Engine</h1>
        </div>
        <button onclick="openDocManager()" class="text-xs bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 px-3 py-1.5 rounded-lg transition-colors flex items-center space-x-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span>Manage Database</span>
        </button>
    </header>

    <div id="doc-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-[#1e232b] border border-white/10 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col">
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-sm font-semibold text-gray-200">Active Knowledge Base</h2>
                <button onclick="closeDocManager()" class="text-gray-500 hover:text-gray-300"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <div class="p-5 overflow-y-auto max-h-[60vh]">
                <p class="text-xs text-gray-500 mb-4">Select the documents you want the AI to use for retrieval.</p>
                <div id="doc-list" class="space-y-2">
                    </div>
            </div>
            <div class="px-5 py-4 bg-white/5 border-t border-white/5">
                <button onclick="closeDocManager()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded-lg transition-colors">Save Preferences</button>
            </div>
        </div>
    </div>

    <main id="chat-box" class="flex-1 overflow-y-auto px-4 pt-20 pb-32 scroll-smooth">
        <div class="max-w-3xl mx-auto space-y-8 flex flex-col" id="chat-content">
            <div class="flex space-x-4 opacity-90">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center flex-shrink-0 mt-1 shadow-lg shadow-indigo-500/20"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                <div>
                    <div class="font-medium text-gray-200 text-sm mb-1">System</div>
                    <div class="text-gray-400 leading-relaxed text-[15px]">Initialization complete. Click "Manage Database" to select which files I should read, or upload a new one.</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-gradient-to-t from-[#0d0f12] via-[#0d0f12] to-transparent pb-6 pt-10 px-4">
        <div class="max-w-3xl mx-auto flex items-center bg-[#1e232b] border border-white/10 rounded-full shadow-2xl px-2 py-2 focus-within:ring-1 focus-within:ring-indigo-500/50 transition-all">
            <input type="file" id="file-upload" class="hidden" accept=".pdf" onchange="uploadDocument()">
            <label for="file-upload" class="cursor-pointer p-3 text-gray-400 hover:text-indigo-400 hover:bg-white/5 rounded-full transition-colors" title="Upload PDF">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
            </label>
            <input type="text" id="user-input" placeholder="Message the AI..." autocomplete="off" class="flex-1 bg-transparent text-gray-200 placeholder-gray-500 text-[15px] px-3 py-2 outline-none">
            <button onclick="sendMessage()" class="p-3 bg-white/5 text-gray-300 hover:bg-indigo-600 hover:text-white rounded-full transition-colors"><svg class="w-5 h-5 translate-x-px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg></button>
        </div>
    </footer>

    <script>
        const chatContent = document.getElementById('chat-content');
        const userInput = document.getElementById('user-input');
        const docModal = document.getElementById('doc-modal');
        const docList = document.getElementById('doc-list');
        
        // This array stores the files the user wants to search
        let activeFiles = []; 

        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // --- DOCUMENT MANAGEMENT LOGIC ---
        async function openDocManager() {
            docModal.classList.remove('hidden');
            docModal.classList.add('flex');
            docList.innerHTML = `<div class="text-xs text-gray-500 animate-pulse">Loading database...</div>`;
            
            try {
                const res = await fetch('http://127.0.0.1:8000/api/documents');
                const data = await res.json();
                
                // If it's the first time loading, check everything by default
                if (activeFiles.length === 0 && data.documents.length > 0) {
                    activeFiles = [...data.documents]; 
                }

                docList.innerHTML = '';
                if(data.documents.length === 0) {
                    docList.innerHTML = `<div class="text-xs text-gray-500 italic">No files in database.</div>`;
                    return;
                }

                data.documents.forEach(doc => {
                    const isChecked = activeFiles.includes(doc) ? 'checked' : '';
                    docList.innerHTML += `
                        <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg border border-white/5">
                            <label class="flex items-center space-x-3 cursor-pointer flex-1">
                                <input type="checkbox" value="${doc}" ${isChecked} onchange="toggleFile(this)" class="w-4 h-4 text-indigo-600 bg-gray-800 border-gray-600 rounded focus:ring-indigo-500 focus:ring-2">
                                <span class="text-sm text-gray-300 font-mono truncate max-w-[200px]">${doc}</span>
                            </label>
                            <button onclick="deleteDocument('${doc}')" class="text-red-400 hover:text-red-300 p-1" title="Delete from disk">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    `;
                });
            } catch (e) {
                docList.innerHTML = `<div class="text-xs text-red-400">Failed to load database.</div>`;
            }
        }

        function closeDocManager() {
            docModal.classList.add('hidden');
            docModal.classList.remove('flex');
        }

        function toggleFile(checkbox) {
            if (checkbox.checked) {
                if (!activeFiles.includes(checkbox.value)) activeFiles.push(checkbox.value);
            } else {
                activeFiles = activeFiles.filter(f => f !== checkbox.value);
            }
        }

        async function deleteDocument(filename) {
            if(!confirm(`Are you sure you want to permanently delete ${filename}?`)) return;
            try {
                await fetch(`http://127.0.0.1:8000/api/documents/${filename}`, { method: 'DELETE' });
                activeFiles = activeFiles.filter(f => f !== filename); // Remove from active
                openDocManager(); // Refresh UI
                addMessage(`🗑️ Deleted **${filename}**. \n*(Note: Restart the server to clear it from active RAM).*`, 'system');
            } catch (e) {
                alert("Failed to delete file.");
            }
        }
        // ----------------------------------

        async function uploadDocument() {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];
            if (!file) return;

            addMessage(`📎 Uploading and indexing: **${file.name}**...`, 'user');
            const loadingId = addLoading();

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch('http://127.0.0.1:8000/api/upload', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Upload Failed");
                const data = await response.json();
                
                // Automatically activate the new file!
                if (!activeFiles.includes(data.filename)) activeFiles.push(data.filename);

                document.getElementById(loadingId).remove();
                addMessage(`✅ Successfully indexed **${data.filename}**. It is automatically selected for queries.`, 'system');
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage("⚠️ Error: Could not upload the document.", 'system');
            }
            fileInput.value = ""; 
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            const loadingId = addLoading();

            try {
                // SEND THE ACTIVE FILES ARRAY TO THE API!
                const response = await fetch('http://127.0.0.1:8000/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: text,
                        selected_files: activeFiles 
                    })
                });

                if (!response.ok) throw new Error("API Connection Failed");
                const data = await response.json();
                
                document.getElementById(loadingId).remove();
                addMessage(data.final_answer, 'ai', data.workflow_log);
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage("⚠️ Error: Could not reach the API. Please check your Uvicorn server.", 'system');
            }
        }

        


function addMessage(text, sender, workflow = null) {
            const div = document.createElement('div');
            div.className = "flex space-x-4 opacity-0 transition-opacity duration-500 ease-in-out";
            
            let avatar = ''; let name = '';
            if (sender === 'user') {
                avatar = `<div class="w-8 h-8 rounded-lg bg-gray-700 flex items-center justify-center flex-shrink-0 mt-1"><svg class="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></div>`;
                name = "You";
            } else if (sender === 'ai') {
                avatar = `<div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center flex-shrink-0 mt-1 shadow-lg shadow-indigo-500/20"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>`;
                name = "CRAG Engine";
            } else {
                avatar = `<div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center flex-shrink-0 mt-1 shadow-lg shadow-emerald-500/20"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div>`;
                name = "System";
            }

            // --- UPGRADED WORKFLOW HTML WITH RAW DATA EXPOSURE ---
            let workflowHtml = "";
            if (workflow && workflow.length > 0) {
                let steps = workflow.map(step => {
                    let detail = step.verdict ? ` <span class="text-indigo-400 font-semibold">(${step.verdict})</span>` : "";
                    let web = step.generated_web_query ? `<br><span class="text-emerald-400 mt-1 inline-block">↳ Web Query: ${step.generated_web_query}</span>` : "";
                    
                    // Render the raw documents if they exist for this step
                    let docsHtml = "";
                    if (step.used_documents && step.used_documents.length > 0) {
                        let docItems = step.used_documents.map((d, i) => 
                            `<div class="mt-2 bg-[#0d0f12] p-3 rounded-md text-[11px] text-gray-400 overflow-x-auto max-h-40 overflow-y-auto whitespace-pre-wrap border border-white/5 font-mono shadow-inner">
                                <span class="text-indigo-400 font-bold mb-1 block uppercase tracking-wider">Snippet ${i+1}:</span>${d}
                             </div>`
                        ).join('');
                        
                        docsHtml = `
                            <details class="mt-2 ml-4 mb-3 cursor-pointer group/doc">
                                <summary class="text-[12px] text-gray-500 hover:text-indigo-300 outline-none flex items-center transition-colors">
                                    <svg class="w-3 h-3 mr-1 transition-transform group-open/doc:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                    View Raw AI Data (${step.used_documents.length} blocks)
                                </summary>
                                <div class="mt-2 pl-2 border-l border-white/10 space-y-2 cursor-text">
                                    ${docItems}
                                </div>
                            </details>
                        `;
                    }

                    return `<li class="ml-2 py-2 border-l border-white/10 pl-4 relative">
                                <div class="absolute w-3 h-px bg-white/10 -left-px top-5"></div>
                                <span class="text-gray-300 font-medium">⚙️ ${step.node_executed}</span>${detail}${web}${docsHtml}
                            </li>`;
                }).join('');
                
                workflowHtml = `
                    <details class="mt-5 text-sm border border-white/10 rounded-xl bg-white/5 cursor-pointer group transition-all shadow-sm">
                        <summary class="px-4 py-3 text-gray-400 hover:text-indigo-300 font-mono flex items-center outline-none">
                            <svg class="w-4 h-4 mr-2 transition-transform group-open:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                         View AI Reasoning Logic
                        </summary>
                        <ul class="px-4 pb-4 pt-1 text-gray-500 font-mono tracking-tight list-none m-0">${steps}</ul>
                    </details>
                `;
            }
            // -----------------------------------------------------

            const renderedText = marked.parse(text);
            div.innerHTML = `
                ${avatar}
                <div class="flex-1 min-w-0">
                    <div class="font-medium text-gray-200 text-sm mb-1">${name}</div>
                    <div class="prose prose-invert text-gray-300 text-[15px] max-w-none">${renderedText}</div>
                    ${workflowHtml}
                </div>
            `;
            
            chatContent.appendChild(div);
            requestAnimationFrame(() => { div.classList.remove('opacity-0'); });
            
            // Auto-scroll logic
            setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
        }






        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex space-x-4 opacity-0 transition-opacity duration-300";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center flex-shrink-0 mt-1"><svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                <div class="flex items-center space-x-1 mt-3">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-pulse delay-75"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-pulse delay-150"></div>
                </div>
            `;
            chatContent.appendChild(div);
            requestAnimationFrame(() => { div.classList.remove('opacity-0'); });
            window.scrollTo(0, document.body.scrollHeight);
            return id;
        }
    </script>
</body>
</html>
